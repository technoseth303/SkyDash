name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install Gradle 8.4 (bypass wrapper JAR completely)
      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      # Android SDK (commandline tools + needed packages)
      - name: Set up Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/android-sdk
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          curl -Lo cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdtools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # Use the installed Gradle (NOT ./gradlew)
      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyDash-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
