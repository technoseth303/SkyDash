name: Build Android Debug APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Android/AGP modern builds expect JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"

      # Install Gradle (so we can generate the wrapper even if wrapper JAR is missing)
      - name: Install Gradle 8.4
        run: |
          curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

      # Generate wrapper files (creates gradlew + gradle/wrapper/gradle-wrapper.jar)
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4 --distribution-type all
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
